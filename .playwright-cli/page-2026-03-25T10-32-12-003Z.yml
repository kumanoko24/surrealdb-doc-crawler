        - main [ref=e243]:
          - generic [ref=e245]:
            - generic [ref=e246]:
              - img "SurrealQL" [ref=e247]
              - heading "SurrealQL" [level=1] [ref=e248]:
                - text: SurrealQL
                - link [ref=e249] [cursor=pointer]:
                  - /url: "#surrealql"
            - paragraph [ref=e251]: SurrealQL is a powerful and intuitive database query language that closely resembles traditional SQL but comes with unique differences and improvements.
            - paragraph [ref=e252]: SurrealQL is designed to provide developers with a seamless and intuitive way to interact with SurrealDB. It offers a familiar syntax and supports various statement types, allowing you to perform complex database operations efficiently.
            - paragraph [ref=e253]: While SurrealQL shares similarities with traditional SQL, it introduces enhancements and optimizations that make it well-suited for working with SurrealDB's advanced features and data models. Whether you are querying data, modifying records, or managing database structures, SurrealQL provides a comprehensive set of capabilities to meet your needs.
            - heading "Key Features" [level=2] [ref=e254]:
              - text: Key Features
              - link [ref=e255] [cursor=pointer]:
                - /url: "#key-features"
            - paragraph [ref=e257]: "SurrealQL offers several key features that make it a powerful tool for working with SurrealDB:"
            - list [ref=e258]:
              - listitem [ref=e259]:
                - paragraph [ref=e262]:
                  - strong [ref=e263]: Familiar Syntax
                  - text: ": SurrealQL adopts a syntax similar to traditional SQL, making it easy for developers familiar with SQL to transition to SurrealDB seamlessly."
              - listitem [ref=e264]:
                - paragraph [ref=e267]:
                  - strong [ref=e268]: Advanced Querying
                  - text: ": SurrealQL supports a wide range of querying capabilities, including filtering, sorting, aggregating, and joining data from multiple tables."
              - listitem [ref=e269]:
                - paragraph [ref=e272]:
                  - strong [ref=e273]: Data Manipulation
                  - text: ": With SurrealQL, you can easily insert, update, and delete records in your SurrealDB database, allowing you to manage your data effectively."
              - listitem [ref=e274]:
                - paragraph [ref=e277]:
                  - strong [ref=e278]: Graph relationships
                  - text: ": SurrealQL supports graph relationships, allowing you to define and query relationships between records in your database."
              - listitem [ref=e279]:
                - paragraph [ref=e282]:
                  - strong [ref=e283]: Schema Management
                  - text: ": SurrealQL provides features for creating and modifying database schemas, allowing you to define the structure of your data and enforce data integrity."
              - listitem [ref=e284]:
                - paragraph [ref=e287]:
                  - strong [ref=e288]: Performance Optimization
                  - text: ": SurrealQL incorporates optimizations specific to SurrealDB, ensuring efficient execution of queries and minimizing resource usage."
            - heading "Getting Started" [level=2] [ref=e289]:
              - text: Getting Started
              - link [ref=e290] [cursor=pointer]:
                - /url: "#getting-started"
            - paragraph [ref=e292]:
              - text: To start using
              - link "SurrealQL" [ref=e293] [cursor=pointer]:
                - /url: /docs/surrealql/statements/begin
              - text: ", refer to the documentation on the various statement types and their syntax. The statements page provides comprehensive examples and explanations for each statement type, helping you understand how to construct queries and interact with SurrealDB effectively."
            - paragraph [ref=e294]: SurrealQL empowers you to leverage the full potential of SurrealDB and enables you to build robust and scalable applications. Let's dive into the world of SurrealQL and unlock the capabilities of SurrealDB together!
